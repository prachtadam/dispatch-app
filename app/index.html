<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch Tech App</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="screen active" id="login-screen">
    <div class="card">
      <h1>Dispatch Login</h1>
      <p class="subtitle">Enter your name and PIN to continue.</p>
      <label for="login-name">Name</label>
      <input id="login-name" type="text" placeholder="Your name" autocomplete="name" />
      <label for="login-pin">PIN</label>
      <input id="login-pin" type="password" placeholder="PIN" inputmode="numeric" maxlength="6" />
      <button class="primary-button" onclick="login()">Sign In</button>
      <p id="login-error" class="error-text"></p>
    </div>
  </div>

  <div class="screen hidden" id="placeholder-screen">
    <div class="card">
      <header class="placeholder-header">
        <div>
          <p class="small-label">Logged in as</p>
          <h2 id="tech-name">Tech Name</h2>
        </div>
      </header>
      <div class="placeholder-body">
        <p>This is a placeholder screen for the Dispatch Tech app.</p>
        <p>Full workflow will be built later.</p>
      </div>
      <button class="secondary-button" onclick="logout()">Log Out</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
